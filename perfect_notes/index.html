<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <title>Notas</title>
  </head>
  <body>
    <main id="notes" aria-label="Listado de notas" data-testid="feed"></main>
    <div class="feed-bar" data-testid="feed-bar">
      <div class="feed-action">
        <button type="button" data-action="insert-note" data-testid="insert-note">+ nota</button>
      </div>
    </div>

    <template id="note-template">
      <section class="note-wrap" data-testid="note">
        <fieldset>
          <legend>
            <textarea
              class="note-title"
              data-testid="note-title"
              rows="1"
              spellcheck="true"
              autocapitalize="sentences"
              aria-label="Título de la nota"
            ></textarea>
          </legend>
          <div class="blocks" data-testid="note-blocks"></div>
        </fieldset>
        <div class="note-footer">
          <div class="note-footer-actions" data-testid="note-footer-actions">
            <button
              type="button"
              class="note-pin"
              data-action="toggle-pin"
              data-testid="toggle-pin"
              aria-label="Pinear nota"
            >
              pinear
            </button>
            <button
              type="button"
              class="note-delete"
              data-action="delete-note"
              data-testid="delete-note"
              aria-label="Borrar nota"
            >
              borrar
            </button>
          </div>
          <div class="note-stamp" data-testid="note-stamp" aria-label="Última edición"></div>
        </div>
      </section>
    </template>

    <template id="block-template">
      <div class="block" data-testid="block">
        <div class="block-row">
          <label class="toggle">
            <input type="checkbox" data-testid="check-toggle" />
          </label>
          <textarea
            class="block-text"
            data-testid="block-text"
            rows="1"
            spellcheck="true"
            autocapitalize="sentences"
          ></textarea>
          <div class="adjust">
            <button type="button" data-action="outdent" data-testid="outdent" aria-label="Sacar nivel">←</button>
            <button type="button" data-action="indent" data-testid="indent" aria-label="Indentar">→</button>
          </div>
        </div>
        <div class="block-actions">
          <button type="button" data-action="add-check" data-testid="add-check">+ checklist</button>
        </div>
        <div class="children"></div>
      </div>
    </template>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
